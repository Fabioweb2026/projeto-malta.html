<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malta Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#111;
    color:white;
}

.hero{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#1a1a1a;
}

h1{
    font-size:70px;
    color:#b39359;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#222;
    border-radius:20px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

</style>
</head>

<body>

<section class="hero">

<h1>Malta</h1>

<p>
Modern Mediterranean Experience
</p>

</section>

<section class="grid">

<div class="card">

<img src="malta5.jpg">

<div class="card-content">
<h3>Gastronomia</h3>
</div>

</div>

<div class="card">

<img src="malta10.jpeg">

<div class="card-content">
<h3>Valletta</h3>
</div>

</div>

<div class="card">

<img src="malta6.jpg">

<div class="card-content">
<h3>Azure Horizons</h3>
</div>

</div>

</section>

</body>
</html>
