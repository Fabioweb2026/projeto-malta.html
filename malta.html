<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malta Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background-color:#fdfaf6;
    overflow-x:hidden;
}

/* HERO */

.hero{
    height:75vh;
    width:100%;

    background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('malta9.jpeg') no-repeat center center;

    background-size:cover;

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;

    border-bottom:2px solid #b39359;

    padding:0 50px;
}

/* BOTÃO */

.btn-back{
    position:absolute;

    top:30px;
    left:30px;

    text-decoration:none;

    color:#fff;

    font-weight:800;
    font-size:11px;

    text-transform:uppercase;

    border:1px solid #b39359;

    padding:10px 22px;

    border-radius:50px;

    background:rgba(0,0,0,0.5);

    z-index:100;

    transition:0.3s;
}

.btn-back:hover{
    background:#b39359;
    color:#000;
}

/* FOTO */

.side-frame{
    width:400px;
    height:280px;

    border-radius:20px;

    border:2px solid rgba(255,255,255,0.4);

    overflow:hidden;

    box-shadow:0 20px 40px rgba(0,0,0,0.4);

    margin-right:40px;

    flex-shrink:0;
}

.side-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* VIDRO */

.glass-box{
    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    padding:60px 100px;

    border-radius:30px;

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 30px 60px rgba(0,0,0,0.3);
}

.glass-box h1{
    font-family:'Playfair Display',serif;

    font-size:clamp(60px,10vw,110px);

    color:#b39359;

    margin:0;
}

/* CONTAINER */

.container{
    max-width:1200px;

    margin:-50px auto 80px;

    padding:0 20px;

    position:relative;

    z-index:50;
}

/* GRID */

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:30px;
}

/* CARD */

.card{
    background:#fff;

    border-radius:24px;

    overflow:hidden;

    border:1px solid #e5e1da;

    box-shadow:0 15px 35px rgba(0,0,0,0.1);

    text-align:center;

    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:240px;

    object-fit:cover;

    display:block;
}

.card-body{
    padding:30px;
}

.card-body h3{
    color:#b39359;

    font-size:24px;

    margin-bottom:10px;

    font-family:'Playfair Display',serif;
}

.card-body p{
    color:#888;

    font-size:12px;

    font-weight:800;

    text-transform:uppercase;
}

/* MOBILE */

@media(max-width:900px){

    .hero{
        flex-direction:column;
        height:auto;
        padding:120px 20px 60px;
    }

    .side-frame{
        width:100%;
        max-width:420px;
        margin-right:0;
        margin-bottom:30px;
    }

    .glass-box{
        padding:40px 30px;
        text-align:center;
    }

}

</style>
</head>

<body>

<header class="hero">

    <a href="index.html" class="btn-back">
        ← VOLTAR AO PORTFÓLIO
    </a>

    <div class="side-frame">
        <img src="malta01.jpeg" alt="Malta Principal">
    </div>

    <div class="glass-box">
        <h1>Malta</h1>
    </div>

</header>

<div class="container">

    <div class="grid">

        <!-- CARD 1 -->
        <div class="card">

            <img src="malta5.jpg" alt="Gastronomia">

            <div class="card-body">

                <h3>Gastronomia</h3>

                <p>SLIEMA, MALTA</p>

            </div>

        </div>

        <!-- CARD 2 -->
        <div class="card">

            <img src="malta10.jpeg" alt="Cidade Histórica">

            <div class="card-body">

                <h3>Cidade Histórica</h3>

                <p>VALLETTA, MALTA</p>

            </div>

        </div>

        <!-- CARD 3 -->
        <div class="card">

            <img src="malta6.jpg" alt="Litoral">

            <div class="card-body">

                <h3>Azure Horizons</h3>

                <p>LITORAL MEDITERRÂNEO</p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
