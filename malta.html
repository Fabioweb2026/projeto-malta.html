<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malta Experience | Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:linear-gradient(135deg,#f7f1e3,#e6d5b8);
    color:#2b2b2b;
    min-height:100vh;
}

/* BOTÃO */
.back{
    position:absolute;
    top:20px;
    left:20px;
    text-decoration:none;
    background:#b39359;
    color:white;
    padding:10px 16px;
    border-radius:30px;
    font-size:12px;
    transition:0.3s;
}

.back:hover{
    background:#8c6d3c;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px 50px;
}

.hero h1{
    font-size:60px;
    color:#b39359;
    letter-spacing:2px;
}

.hero p{
    margin-top:10px;
    opacity:0.7;
    font-size:14px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    max-width:1100px;
    margin:auto;
    padding:40px 20px 80px;
}

/* CARD */
.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.12);
    transition:0.35s ease;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 25px 50px rgba(0,0,0,0.18);
}

/* IMAGEM */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    transition:0.4s ease;
}

.card:hover img{
    transform:scale(1.05);
}

/* CONTEÚDO */
.card-content{
    padding:22px;
    text-align:center;
}

.card h3{
    color:#b39359;
    margin-bottom:8px;
    font-size:20px;
}

.card p{
    font-size:12px;
    opacity:0.65;
    letter-spacing:1px;
}

/* LINHA */
.line{
    width:45px;
    height:2px;
    background:#b39359;
    margin:12px auto;
    border-radius:10px;
}

/* RESPONSIVO */
@media(max-width:768px){

    .hero h1{
        font-size:42px;
    }

    .grid{
        padding:20px;
    }

}

</style>
</head>

<body>

<a class="back" href="index.html">← Voltar</a>

<section class="hero">

    <h1>Malta Experience</h1>

    <p>
        Modern Mediterranean Travel & Culture
    </p>

</section>

<section class="grid">

    <!-- CARD 1 -->
    <div class="card">

        <img src="valeta.png">

        <div class="card-content">

            <div class="line"></div>

            <h3>Valletta</h3>

            <p>Historic Capital</p>

        </div>

    </div>

    <!-- CARD 2 -->
    <div class="card">

        <img src="goldenbay.png" 

        <div class="card-content">

            <div class="line"></div>

            <h3>Golden Bay</h3>

            <p>Beach Experience</p>

        </div>

    </div>

    <!-- CARD 3 -->
    <div class="card">

        <img src="malta6.jpg" alt="St. John’s Cathedral">

        <div class="card-content">

            <div class="line"></div>

            <h3>St. John’s Cathedral</h3>

            <p>Historic Architecture</p>

        </div>

    </div>

</section>

</body>
</html>
