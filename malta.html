        <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fábio Web | Portfólio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0f0f0f;
    color: white;
    min-height: 100vh;
}

/* HEADER */

header {
    text-align: center;
    padding: 60px 20px 30px;
}

header h1 {
    font-size: 40px;
    color: #b39359;
    letter-spacing: 2px;
}

header p {
    opacity: 0.7;
    margin-top: 10px;
}

/* GRID */

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

/* CARD */

.card {
    background: #1a1a1a;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(179,147,89,0.2);
}

.card:hover {
    transform: translateY(-8px);
    border-color: #b39359;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 18px;
    text-align: center;
}

.card h3 {
    color: #b39359;
    margin-bottom: 6px;
}

.card p {
    font-size: 12px;
    opacity: 0.7;
}

/* BUTTON (opcional futuro) */

</style>

</head>

<body>

<header>
    <h1>Fábio Web</h1>
    <p>Portfólio de Projetos Web</p>
</header>

<section class="grid">

    <!-- CARD 1 -->
    <div class="card" onclick="window.location.href='malta.html'">
        <img src="img/malta.jpg" alt="Malta">
        <div class="card-content">
            <h3>Malta Experience</h3>
            <p>Projeto turístico e visual</p>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card" onclick="window.location.href='web-store.html'">
        <img src="img/store.jpg" alt="Store">
        <div class="card-content">
            <h3>Web Store HTML</h3>
            <p>Loja de moda online</p>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="card" onclick="window.open('resume.pdf','_blank')">
        <img src="img/cv.jpg" alt="CV">
        <div class="card-content">
            <h3>Currículo</h3>
            <p>Experiência profissional</p>
        </div>
    </div>

</section>

</body>
</html>
