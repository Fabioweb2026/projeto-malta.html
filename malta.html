<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malta Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #111;
    color: white;
}

header {
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    color: #b39359;
    font-size: 50px;
}

.back {
    display: inline-block;
    margin: 20px;
    color: #b39359;
    text-decoration: none;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #1a1a1a;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-6px);
    border: 1px solid #b39359;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    color: #b39359;
}

</style>

</head>

<body>

<a class="back" href="index.html">← Voltar</a>

<header>
    <h1>Malta Experience</h1>
    <p>Modern Mediterranean Experience</p>
</header>

<section class="grid">

    <div class="card">
        <img src="malta01.jpeg" alt="Valletta Malta">
        <div class="card-content">
            <h3>Valletta</h3>
        </div>
    </div>

    <div class="card">
        <img src="malta8.jpg" alt="Golden Bay Malta">
        <div class="card-content">
            <h3>Golden Bay</h3>
        </div>
    </div>

    <div class="card">
        <img src="malta6.jpg" alt="Blue Lagoon Malta">
        <div class="card-content">
            <h3>Blue Lagoon</h3>
        </div>
    </div>

</section>

</body>
</html>
