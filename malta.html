<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malta Mediterranean</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
    url('foto.fabio1.jpg') center/cover no-repeat;
    color: white;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    color: #b39359;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* GRID */
.projects-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 22px;
    max-width: 1200px;
    margin: auto;
}

/* CARD */
.card {
    width: 350px;
    background: rgba(26,26,26,0.95);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(179,147,89,0.3);
    transition: 0.35s ease;
}

.card:hover {
    transform: translateY(-10px);
    border-color: rgba(179,147,89,0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* IMAGEM */
.card-img {
    width: 100%;
    height: 200px;
    overflow: hidden;
    background: #111;
}

.card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.card:hover .card-img img {
    transform: scale(1.05);
}

/* 🔥 SOLLENE GROUP (AGORA COM NOVA IMAGEM) */
.card:nth-child(1) .card-img {
    background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
}

.card:nth-child(1) .card-img img {
    width: 92%;
    height: 92%;
    object-fit: contain;
    filter: drop-shadow(0px 6px 10px rgba(0,0,0,0.6));
}

/* RESUME */
.resume-preview {
    width: 100%;
    height: 200px;
    position: relative;
    overflow: hidden;
    background: #111;
}

.resume-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.88;
    transition: 0.4s ease;
}

.card:hover .resume-image {
    transform: scale(1.05);
    opacity: 1;
}

/* CONTENT */
.card-content {
    padding: 20px;
    text-align: center;
}

.card h3 {
    color: #b39359;
    margin-bottom: 8px;
}

.card p {
    font-size: 14px;
    color: #dcdcdc;
}

/* HOME BUTTON */
.home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999;
    background: #b39359;
    color: white;
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.home-btn:hover {
    background: #8c6d3c;
}

/* MOBILE */
@media (max-width: 768px) {
    .projects-grid {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 92%;
    }
}
</style>
</head>

<body>

<a class="home-btn" href="https://fabioweb2026.github.io/portifolio-web/">
← Home
</a>

<h1>Web Portfolio</h1>

<div class="projects-grid">

    <!-- CARD 1 - MALTA (NOVA IMAGEM) -->
    <div class="

        <div class="card-img">
            <img src="imagem5.jpg.jpeg" alt="Golden Bay">
        </div>

        <div class="card-content">
            <h3>Golden Bay </h3>
            <p>Inventory system</p>
        </div>

    </div>

    <!-- CARD 2 -->
    <div class"

        <div class="card-img">
            <img src="malta01.jpg.png" alt="Malta Project">
        </div>

        <div class="card-content">
            <h3>🌍 Malta Project</h3>
            <p>Global business platform</p>
        </div>

    </div>

</body>
</html>
