<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FUNDO COM IMAGEM */
        body {
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("mata.png14.png"); /* coloque essa imagem no GitHub */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* CAMADA ESCURA PARA LEGIBILIDADE */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: 0;
        }

        /* TÍTULO */
        h1 {
            font-size: 80px;
            color: #ffffff;
            z-index: 1;
            position: relative;
            letter-spacing: 2px;
        }

    </style>
</head>

<body>

    <h1>Malta</h1>

</body>
</html>
