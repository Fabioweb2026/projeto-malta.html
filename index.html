<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<style>

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.texto{
    position:relative;
    width:500px;
    height:200px;
}

.titulo1{
    font-size:90px; /* tamanho da letra */
    color:white;
    position:absolute;
    top:0;
    left:0;
    z-index:1;
    font-weight:bold;
}

.titulo2{
    font-size:120px;
    color:rgba(255,255,255,0.15);
    position:absolute;
    top:20px;
    left:40px;
    z-index:0;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="texto">
    <div class="titulo2">MALTA</div>
    <div class="titulo1">VALLETTA</div>
</div>

</body>
</html>
<style>

body{
    background:#F5F0E8;
    font-family: 'Playfair Display', serif;
}

h1{
    font-size:90px;
    color:#C9A227;
    letter-spacing:4px;
}

p{
    color:#555;
    font-size:20px;
}

</style>
