<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Configuração do Fundo com Malta10.jpg */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('malta10.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ESTILOS DO HEADER / HERO */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .side-frame img {
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            color: white;
            margin-top: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* CONTAINER E GRID */
        .container {
            max-width: 1200px;
            margin: 40px auto 80px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 20px;
            text-align: center;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            color: #b39359;
            margin-bottom: 8px;
        }

        .card-body p {
            font-size: 12px;
            font-weight: 700;
            color: #777;
            text-transform: uppercase;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .glass-box h1 {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>

    <header class="hero">
        <a href="index.html" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        
        <div class="side-frame">
            <img src="malta1.jpeg" alt="Malta Principal">
        </div>

        <div class="glass-box">
            <h1>Malta</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <img src="malta10.jpg" alt="Malta Experience">
                <div class="card-body">
                    <h3>Malta Experience</h3>
                    <p>Valletta, Malta</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
