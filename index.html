<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cards SPA</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f1720;
    color:white;
}

/* HOME (cards) */
#home{
    display:flex;
    gap:20px;
    justify-content:center;
    padding:50px;
}

.card{
    width:250px;
    background:#1c2a35;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card button{
    margin:15px;
    padding:10px 15px;
    border:none;
    cursor:pointer;
    border-radius:10px;
    background:#00bcd4;
    color:black;
    font-weight:bold;
}

/* PÁGINA INTERNA */
.page{
    display:none;
    padding:40px;
}

.page img{
    width:100%;
    max-width:600px;
    border-radius:15px;
}

.back{
    margin-top:20px;
    padding:10px 15px;
    border:none;
    background:white;
    color:black;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">

    <div class="card">
        <img src="goldenbay.jpg">
        <h3>Golden Bay</h3>
        <button onclick="openPage('page1')">Explore</button>
    </div>

    <div class="card">
        <img src="imagem2.jpg">
        <h3>Valletta</h3>
        <button onclick="openPage('page2')">Explore</button>
    </div>

    <div class="card">
        <img src="imagem3.jpg">
        <h3>Blue Lagoon</h3>
        <button onclick="openPage('page3')">Explore</button>
    </div>

</div>

<!-- PÁGINA 1 -->
<div id="page1" class="page">
    <img src="goldenbay.jpg">
    <h1>Golden Bay</h1>
    <p>Informações completas sobre Golden Bay aqui...</p>
    <button class="back" onclick="goBack()">Voltar</button>
</div>

<!-- PÁGINA 2 -->
<div id="page2" class="page">
    <img src="imagem2.jpg">
    <h1>Valletta</h1>
    <p>Informações completas sobre Valletta aqui...</p>
    <button class="back" onclick="goBack()">Voltar</button>
</div>

<!-- PÁGINA 3 -->
<div id="page3" class="page">
    <img src="imagem3.jpg">
    <h1>Blue Lagoon</h1>
    <p>Informações completas sobre Blue Lagoon aqui...</p>
    <button class="back" onclick="goBack()">Voltar</button>
</div>

<script>
function openPage(pageId){
    document.getElementById("home").style.display = "none";

    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.style.display = "none");

    document.getElementById(pageId).style.display = "block";
}

function goBack(){
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.style.display = "none");

    document.getElementById("home").style.display = "flex";
}
</script>

</body>
</html>
