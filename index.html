<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Experiência Premium</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfaf8;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* HERO */
        .hero-banner {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .glass-title h1 {
            font-size: 48px;
            font-weight: 700;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        /* GRID */
        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .guide-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .guide-card:hover {
            transform: translateY(-5px);
        }

        .guide-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card-body h3 {
            margin-bottom: 5px;
            font-size: 18px;
        }

        .card-body p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

    <section class="hero-banner">
        <a href="index.html" class="btn-back">← Voltar ao Portfólio</a>
        <div class="glass-title">
            <h1>Malta</h1>
        </div>
    </section>

    <div class="container">
        <div class="guide-grid">

            <!-- CARD 1 -->
            <div class="guide-card">
                <img src="giorgios3.png" alt="Gastronomia">
                <div class="card-body">
                    <h3>Gastronomia</h3>
                    <p>Sliema, Malta</p>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="guide-card">
                <img src="malta1.jpeg" alt="História">
                <div class="card-body">
                    <h3>Cidade Histórica</h3>
                    <p>Valletta, Malta</p>
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="guide-card">
                <img src="malta12.jpeg" alt="Litoral">
                <div class="card-body">
                    <h3>Azure Horizons</h3>
                    <p>Litoral Mediterrâneo</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
