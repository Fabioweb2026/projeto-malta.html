<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Journey</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f9ff; /* azul bem claro */
            color: #1f2d3d;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 60px;
            flex-wrap: wrap;
        }

        .image-box img {
            width: 420px;
            max-width: 100%;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .text-box {
            max-width: 500px;
        }

        h1 {
            color: #0b2a4a; /* azul marinho elegante */
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        .location {
            margin-top: 20px;
            padding: 15px;
            background: #ffffff;
            border-left: 4px solid #0b2a4a;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }

        .location strong {
            display: block;
            margin-bottom: 5px;
            color: #0b2a4a;
        }

        .btn-map {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #0b2a4a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-map:hover {
            background: #163d66;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- IMAGEM ESQUERDA -->
    <div class="image-box">
        <img src="malta01.jpeg" alt="Malta View">
    </div>

    <!-- TEXTO DIREITA -->
    <div class="text-box">

        <h1>Malta</h1>

        <p>
            Malta is a Mediterranean island country known for its crystal-clear waters,
            historic architecture, and stunning coastal landscapes. A perfect mix of history and modern lifestyle.
        </p>

        <!-- LOCALIZAÇÃO -->
        <div class="location">
            <strong>Location:</strong>
            Valletta, Malta 🇲🇹<br>
            Mediterranean Sea, Southern Europe

            <br>

            <a class="btn-map"
               href="https://www.google.com/maps/place/Valletta,+Malta"
               target="_blank">
               View on Google Maps
            </a>
        </div>

    </div>

</div>

</body>
</html>
