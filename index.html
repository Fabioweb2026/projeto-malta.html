<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Se a imagem malta10.jpg não carregar, ele ficará cinza escuro */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('malta10.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #333; 
            min-height: 100vh;
            color: white;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.2);
            padding: 12px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        .btn-back:hover { background: rgba(255,255,255,0.4); }

        .side-frame img {
            width: 280px;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 8vw, 80px);
            margin-top: 20px;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .card:hover { transform: translateY(-10px); }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-body {
            padding: 25px;
            text-align: center;
            color: #333;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            color: #b39359;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .card-body p {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="hero">
        <a href="index.html" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        
        <div class="side-frame">
            <!-- Verifique se o nome é malta1.jpeg ou malta1.jpg -->
            <img src="malta1.jpeg" alt="Malta Principal">
        </div>

        <div class="glass-box">
            <h1>Malta</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Card 1: Malta Experience -->
            <div class="card">
                <img src="malta10.jpg" alt="Malta">
                <div class="card-body">
                    <h3>Malta Experience</h3>
                    <p>Valletta, Malta</p>
                </div>
            </div>

            <!-- Card 2: Gioges Cafeteria -->
            <div class="card">
                <img src="cafe.jpg" alt="Gioges Cafeteria">
                <div class="card-body">
                    <h3>Gioges Cafeteria</h3>
                    <p>Gastronomia e Café</p>
                </div>
            </div>

            <!-- Card 3: Turismo Lazer -->
            <div class="card">
                <img src="turismo.jpg" alt="Turismo Lazer">
                <div class="card-body">
                    <h3>Turismo Lazer</h3>
                    <p>Exploração e Aventura</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
