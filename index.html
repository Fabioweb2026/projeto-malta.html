<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malta | Experiência Premium</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f4f6f8;
}

/* HERO */
.hero {
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
    padding: 70px 20px;
    position: relative;
}

.hero h1 {
    font-size: 48px;
    margin: 0;
}

.back {
    position: absolute;
    left: 20px;
    top: 20px;
    color: white;
    text-decoration: none;
    font-weight: 600;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-body {
    padding: 15px;
}

.card-body h3 {
    margin: 0 0 5px;
}

.card-body p {
    margin: 0;
    color: #666;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="hero">
    <a class="back" href="index.html">← Voltar</a>
    <h1>Malta</h1>
</div>

<div class="container">
    <div class="grid">

        <div class="card">
            <img src="giorgios3.png" alt="">
            <div class="card-body">
                <h3>Gastronomia</h3>
                <p>Sliema, Malta</p>
            </div>
        </div>

        <div class="card">
            <img src="malta1.jpeg" alt="">
            <div class="card-body">
                <h3>Cidade Histórica</h3>
                <p>Valletta, Malta</p>
            </div>
        </div>

        <div class="card">
            <img src="malta12.jpeg" alt="">
            <div class="card-body">
                <h3>Litoral</h3>
                <p>Mar Mediterrâneo</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
