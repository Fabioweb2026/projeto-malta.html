<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET E FUNDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fdfcf0 0%, #e6d5b8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CABEÇALHO */
        .hero {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #b39359;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-back:hover { background: #b39359; color: white; }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 90px);
            color: #b39359;
        }

        /* GRID E EFEITO DE ZOOM */
        .container {
            max-width: 1200px;
            padding: 0 20px 80px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden; /* Importante para o zoom não vazar */
            box-shadow: 0 10px 30px rgba(179, 147, 89, 0.15);
            transition: 0.4s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(179, 147, 89, 0.3);
        }

        /* Moldura da imagem para o Zoom */
        .card-img-container {
            width: 100%;
            height: 250px;
            overflow: hidden; /* Esconde a parte da imagem que cresce */
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease; /* Velocidade do zoom */
        }

        .card:hover img {
            transform: scale(1.15); /* Aumenta a foto em 15% */
        }

        .card-body {
            padding: 25px;
            text-align: center;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            color: #b39359;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .card-body p {
            font-size: 11px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        /* BOTÃO INTERATIVO */
        .btn-card {
            display: inline-block;
            padding: 10px 30px;
            border: 1px solid #b39359;
            color: #b39359;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-card:hover {
            background: #b39359;
            color: white;
        }
    </style>
</head>
<body>

    <header class="hero">
        <a href="index.html" class="btn-back">← VOLTAR</a>
        <div class="glass-box">
            <h1>Malta</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <div class="card">
                <div class="card-img-container">
                    <img src="imagem10.jpg.png" alt="Malta">
                </div>
                <div class="card-body">
                    <h3>Malta Experience</h3>
                    <p>Valletta, Malta</p>
                    <span class="btn-card">Explorar</span>
                </div>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img src="malta01.jpeg" alt="Giorgios">
                </div>
                <div class="card-body">
                    <h3>Giorgios Cafeteria</h3>
                    <p>Gastronomia e Café</p>
                    <span class="btn-card">Ver Menu</span>
                </div>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img src="malta8.jpg" alt="Turismo">
                </div>
                <div class="card-body">
                    <h3>Turismo Lazer</h3>
                    <p>Exploração e Aventura</p>
                    <span class="btn-card">Descobrir</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
