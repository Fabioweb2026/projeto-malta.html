<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET E FUNDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fdfcf0 0%, #e6d5b8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
        }

        /* CABEÇALHO */
        .hero {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #b39359;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-back:hover { background: #b39359; color: white; }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 90px);
            color: #b39359;
        }

        /* GRID ALINHADA LADO A LADO */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 80px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colunas em telas grandes */
            gap: 25px;
        }

        /* CARDS E ZOOM */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(179, 147, 89, 0.15);
            transition: 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(179, 147, 89, 0.3);
        }

        .card-img-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.15);
        }

        .card-body {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            color: #b39359;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .card-body p {
            font-size: 11px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .btn-card {
            display: inline-block;
            padding: 8px 25px;
            border: 1px solid #b39359;
            color: #b39359;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-card:hover {
            background: #b39359;
            color: white;
        }

        /* ESTILO DA GALERIA (MODAL) */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 50px 0;
        }

        .modal:target { display: flex; flex-direction: column; }

        .modal-content {
            max-width: 90%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .modal-content img {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(179, 147, 89, 0.3);
        }

        .modal-close {
            position: fixed;
            top: 20px; right: 40px;
            color: white;
            font-size: 50px;
            text-decoration: none;
            font-weight: bold;
            z-index: 1001;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="hero">
        <a href="index.html" class="btn-back">← VOLTAR</a>
        <div class="glass-box">
            <h1>Malta</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Card 1 -->
            <div class="card">
                <div class="card-img-container">
                    <img src="imagem10.jpg.png" alt="Malta">
                </div>
                <div class="card-body">
                    <h3>Malta Experience</h3>
                    <p>Valletta, Malta</p>
                    <a href="imagem10.jpg.png" target="_blank" class="btn-card">Explorar</a>
                </div>
            </div>

            <!-- Card 2: Giorgios com Galeria -->
            <div class="card">
                <div class="card-img-container">
                    <img src="malta01.jpeg" alt="Giorgios">
                </div>
                <div class="card-body">
                    <h3>Giorgios Cafeteria</h3>
                    <p>Gastronomia e Café</p>
                    <a href="#menu-modal" class="btn-card">Ver Menu</a>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card">
                <div class="card-img-container">
                    <img src="malta8.jpg" alt="Turismo">
                </div>
                <div class="card-body">
                    <h3>Turismo Lazer</h3>
                    <p>Exploração e Aventura</p>
                    <a href="malta8.jpg" target="_blank" class="btn-card">Descobrir</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Galeria Modal do Menu -->
    <div id="menu-modal" class="modal">
        <a href="#" class="modal-close">&times;</a>
        <div class="modal-content">
            <img src="malta09.jpg.jpge.webp" alt="Menu Parte 1">
            <img src="malta10.jpg.jpge.webp" alt="Menu Parte 2">
        </div>
    </div>

</body>
</html>
