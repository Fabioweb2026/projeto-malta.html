<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Experiência Premium</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfaf6; 
            color: #1a1a1a; 
            overflow-x: hidden;
        }

        /* Banner Principal com a imagem de fundo que você escolheu */
        .hero-banner {
            height: 75vh;
            width: 100%;
            background: linear-gradient(rgba(255,255,255,0.1), rgba(253, 250, 246, 1)), 
                        url('mata.png14.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 3px solid #003366; /* AZUL MEDITERRÂNEO */
        }

        /* Título com Azul Profundo e Dourado */
        .glass-title {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            padding: 50px 100px;
            border-radius: 30px;
            border: 1px solid rgba(0, 51, 102, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        .hero-banner h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(70px, 15vw, 130px); 
            color: #003366; /* AZUL PROFUNDO PARA MAIS DESTAQUE */
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }

        /* Botão Voltar Premium */
        .btn-back {
            position: absolute; top: 30px; left: 30px;
            text-decoration: none; color: #003366; font-weight: 800; font-size: 11px;
            text-transform: uppercase; border: 2px solid #003366; padding: 12px 25px;
            border-radius: 50px; background: #fff; transition: 0.3s;
        }
        .btn-back:hover { background: #003366; color: #fff; }

        /* Container dos Cards */
        .container { max-width: 1200px; margin: -60px auto 80px; padding: 0 20px; position: relative; z-index: 10; }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .guide-card {
            background: #fff; border-radius: 28px; overflow: hidden; 
            border: 1px solid #e5e1da; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .guide-card:hover { transform: translateY(-15px); border-color: #b39359; }

        /* AJUSTE DAS IMAGENS: Agora elas vão carregar! */
        .guide-card img { width: 100%; height: 280px; object-fit: cover; background: #eee; }

        .card-body { padding: 35px; text-align: center; }
        .card-body h3 { color: #003366; font-size: 26px; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .card-body p { color: #b39359; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <section class="hero-banner">
        <a href="https://github.io" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        <div class="glass-title">
            <h1>Malta</h1>
        </div>
    </section>

    <div class="container">
        <div class="guide-grid">
            
            <div class="guide-card">
                <!-- Nomes corrigidos conforme seus arquivos no GitHub -->
                <img src="giorgios3.png" alt="Gastronomia">
                <div class="card-body">
                    <h3>Gastronomia</h3>
                    <p>SLIEMA, MALTA</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta1.jpeg" alt="História">
                <div class="card-body">
                    <h3>Cidade Histórica</h3>
                    <p>VALLETTA, MALTA</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta12.jpeg" alt="Litoral">
                <div class="card-body">
                    <h3>Azure Horizons</h3>
                    <p>LITORAL MEDITERRÂNEO</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
