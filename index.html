<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb; /* fundo limpo e elegante */
            color: #1a1a1a;
        }

        /* CONTAINER PRINCIPAL */
        .container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            padding: 50px;
        }

        /* IMAGEM ESQUERDA */
        .container img {
            width: 280px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* TEXTO */
        .text {
            max-width: 650px;
        }

        h1 {
            color: #1e3a8a;
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .location {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .container img {
                width: 90%;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- IMAGEM -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- TEXTO -->
        <div class="text">
            <h1>Malta</h1>

            <p>
                Malta is a Mediterranean island country known for its stunning coastline,
                historical sites, and crystal-clear waters. It is one of the most beautiful
                destinations in Europe.
            </p>

            <div class="location">
                Location: Mediterranean Sea, Southern Europe
            </div>
        </div>

    </div>

</body>
</html>
