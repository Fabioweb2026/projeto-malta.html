<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Experiência Premium</title>
    <style>
        @import url('https://googleapis.com');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfaf6; color: #1a1a1a; overflow-x: hidden; }

        /* Hero: Destaque Topo */
        .hero { height: 70vh; width: 100%; display: flex; align-items: center; background: #fff; border-bottom: 4px solid #003366; padding: 0 8%; position: relative; }
        .hero-img-container { flex: 1; height: 85%; display: flex; justify-content: flex-start; }
        .hero-img-container img { height: 100%; border-radius: 20px; border: 2px solid #b39359; box-shadow: 15px 15px 40px rgba(0, 51, 102, 0.2); object-fit: cover; }
        .hero-content { flex: 1.5; padding-left: 60px; text-align: left; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(50px, 8vw, 90px); color: #003366; line-height: 1; }
        .hero-content p { font-size: 13px; letter-spacing: 6px; text-transform: uppercase; font-weight: 800; color: #b39359; }

        .btn-back { position: absolute; top: 40px; right: 50px; text-decoration: none; color: #003366; font-weight: 800; font-size: 11px; text-transform: uppercase; border: 1px solid #003366; padding: 10px 22px; border-radius: 50px; background: #fff; transition: 0.3s; }
        .btn-back:hover { background: #003366; color: #fff; }

        /* Grade de Cards */
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .guide-card { background: #fff; border-radius: 28px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transition: 0.4s ease; text-align: center; }
        .guide-card img { width: 100%; height: 260px; object-fit: cover; display: block; }
        .card-body { padding: 35px; }
        .card-body h3 { color: #003366; font-size: 24px; margin-bottom: 15px; font-family: 'Playfair Display', serif; }
        .card-body p { color: #b39359; font-size: 12px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>
    <a href="https://github.io" class="btn-back">← Voltar ao Portfólio</a>

    <header class="hero">
        <div class="hero-img-container"><img src="malta1.jpeg" alt="Destaque"></div>
        <div class="hero-content">
            <h1>Malta</h1>
            <p>Herança Mediterrânea</p>
        </div>
    </header>

    <div class="container">
        <div class="guide-grid">
            <div class="guide-card">
                <img src="giorgios3.png" alt="Gastronomia">
                <div class="card-body"><h3>Gastronomia</h3><p>Sliema, Malta</p></div>
            </div>
            <div class="guide-card">
                <img src="malta10.jpeg" alt="História">
                <div class="card-body"><h3>Cidade Histórica</h3><p>Valletta, Malta</p></div>
            </div>
            <div class="guide-card">
                <img src="malta12.jpeg" alt="Litoral">
                <div class="card-body"><h3>Azure Horizons</h3><p>Litoral Mediterrâneo</p></div>
            </div>
        </div>
    </div>
</body>
</html>
