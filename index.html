<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Experiência Premium</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfaf6; 
            color: #1a1a1a; 
            overflow-x: hidden;
        }

        /* Banner Principal conforme seu print */
        .hero-banner {
            height: 70vh;
            width: 100%;
            background: linear-gradient(rgba(253, 250, 246, 0.3), rgba(253, 250, 246, 1)), 
                        url('mata.png14.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 2px solid #b39359;
        }

        .glass-title {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            padding: 40px 80px;
            border-radius: 20px;
            border: 1px solid rgba(179, 147, 89, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .hero-banner h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(60px, 12vw, 120px); 
            color: #b39359; 
            letter-spacing: -2px;
            text-shadow: 2px 2px 0px #fff;
        }

        .btn-back {
            position: absolute; top: 30px; left: 30px;
            text-decoration: none; color: #b39359; font-weight: 800; font-size: 11px;
            text-transform: uppercase; border: 1px solid #b39359; padding: 10px 22px;
            border-radius: 50px; background: #fff; transition: 0.3s;
        }
        .btn-back:hover { background: #b39359; color: #fff; }

        /* Container dos Cards */
        .container { max-width: 1200px; margin: -40px auto 80px; padding: 0 20px; position: relative; z-index: 10; }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .guide-card {
            background: #fff; border-radius: 24px; overflow: hidden; 
            border: 1px solid #eee; transition: 0.4s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .guide-card:hover { transform: translateY(-10px); border-color: #b39359; }

        /* AJUSTE DAS IMAGENS: Agora elas vão aparecer */
        .guide-card img { width: 100%; height: 260px; object-fit: cover; background: #eee; }

        .card-body { padding: 30px; text-align: center; }
        .card-body h3 { color: #b39359; font-size: 24px; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .card-body p { color: #888; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <section class="hero-banner">
        <a href="https://github.io" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        <div class="glass-title">
            <h1>Malta</h1>
        </div>
    </section>

    <div class="container">
        <div class="guide-grid">
            
            <div class="guide-card">
                <img src="giorgios3.png" alt="Gastronomia">
                <div class="card-body">
                    <h3>Gastronomia</h3>
                    <p>Sliema, Malta</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta1.jpeg" alt="História">
                <div class="card-body">
                    <h3>Cidade Histórica</h3>
                    <p>Valletta, Malta</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta12.jpeg" alt="Litoral">
                <div class="card-body">
                    <h3>Azure Horizons</h3>
                    <p>Litoral Mediterrâneo</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
