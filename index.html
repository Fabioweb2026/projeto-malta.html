<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Mediterranean</title>
    <style>
        body {
            background-color: #F5F2EB; 
            font-family: 'Segoe UI', sans-serif;
            color: #3E3B35;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #8C6D46; font-size: 2.5rem; margin-bottom: 5px; }
        header p { font-style: italic; color: #706B62; }
        
        .card-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 100%;
        }
        .card-link { text-decoration: none; color: inherit; }
        .card {
            background-color: #FFFFFF;
            border: 1px solid #E6DFD3;
            border-radius: 12px;
            width: 300px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(140, 109, 70, 0.15);
        }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .card h3 { color: #8C6D46; margin: 15px 0 10px 0; font-size: 1.3rem; }
        .card p { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>Malta Mediterranean</h1>
        <p>Explore the wonders of the heart of the Mediterranean</p>
    </header>

    <div class="card-container">
        <!-- CARD 1 -->
        <a href="tourism.html" class="card-link">
            <div class="card">
                <img src="imagem10.png" alt="Tourism">
                <h3>Tourism</h3>
                <p>Click to explore top destinations and travel routes.</p>
            </div>
        </a>

        <!-- CARD 2 -->
        <a href="gastronomy.html" class="card-link">
            <div class="card">
                <img src="giorgios.png" alt="Gastronomy">
                <h3>Gastronomy & Architecture</h3>
                <p>Click to discover historic buildings and local flavors.</p>
            </div>
        </a>

        <!-- CARD 3 -->
        <a href="bluelagoon.html" class="card-link">
            <div class="card">
                <img src="bluelagoon2.png" alt="Blue Lagoon">
                <h3>Blue Lagoon</h3>
                <p>Click to view photos and information about Comino island.</p>
            </div>
        </a>
    </div>

</body>
</html>
