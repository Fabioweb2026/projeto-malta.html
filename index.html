<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Journey</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            padding: 20px;
        }

        /* MAIN CONTAINER */
        .container {
            display: flex;
            align-items: center;
            gap: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 1000px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* IMAGE */
        .container img {
            width: 350px;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
        }

        /* TEXT */
        .text {
            flex: 1;
        }

        .text h1 {
            margin-bottom: 10px;
            font-size: 28px;
            color: #333;
        }

        .text p {
            font-size: 16px;
            color: #555;
            line-height: 1.5;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            .container img {
                width: 100%;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT IMAGE -->
        <img src="malta01.jpeg" alt="Malta Travel">

        <!-- TEXT CONTENT -->
        <div class="text">
            <h1>Malta Journey</h1>
            <p>
                Welcome to my Malta project.  
                Here I share experiences, images, and stories from this amazing trip.  
                The layout is designed to look modern, simple, and responsive.
            </p>
        </div>

    </div>

</body>

</html>
