<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Mediterranean</title>
    <style>
        /* Reseta as margens e força a página a ocupar a tela inteira */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Cor de fundo em tom de creme */
            background-color: #FFFDD0; 
            
            /* Altura total da tela visível */
            height: 100vh; 
            
            /* Centraliza os itens no meio da página */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Define a fonte padrão e evita barras de rolagem desnecessárias */
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .titulo-central {
            /* Dezoito por cento da largura da tela (proporcional) */
            font-size: 8vw; 
            
            /* Cor do texto, opcionalmente um cinza bem escuro */
            color: #333333; 
            
            /* Centraliza o texto caso o título quebre em duas linhas */
            text-align: center; 
            
            /* Efeito opcional de sombra para destacar o texto */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <h1 class="titulo-central">Malta Mediterranean</h1>

</body>
</html>
