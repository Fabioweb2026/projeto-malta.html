<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malta</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background-image: url("malta10.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    /* TÍTULO */
    .header {
        text-align: center;
        padding-top: 30px;
    }

    .header h1 {
        font-size: 65px;
        color: #0b1f3a;
        background: rgba(255, 255, 255, 0.6);
        display: inline-block;
        padding: 10px 35px;
        border-radius: 12px;
        letter-spacing: 3px;
    }

    /* CONTEÚDO */
    .container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        margin-top: 60px;
        padding: 20px;
        flex-wrap: wrap;
    }

    /* IMAGEM ESQUERDA MENOR */
    .container img {
        width: 250px;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    /* TEXTO DIREITA */
    .info {
        max-width: 420px;
        background: rgba(255, 255, 255, 0.75);
        padding: 25px;
        border-radius: 15px;
        color: #0b1f3a;
    }

    .info h2 {
        margin-bottom: 10px;
        font-size: 26px;
    }

    .info p {
        font-size: 17px;
        line-height: 1.6;
    }
</style>

</head>

<body>

    <!-- TÍTULO -->
    <div class="header">
        <h1>Malta</h1>
    </div>

    <!-- CONTEÚDO -->
    <div class="container">

        <!-- IMAGEM ESQUERDA -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- TEXTO DIREITA -->
        <div class="info">
            <h2>Localização</h2>
            <p>
                📍 Malta é um país insular localizado no Mar Mediterrâneo, ao sul da Itália.  
                <br><br>
                📌 Endereço: Ilha de Malta, Mediterrâneo Central  
                🌍 Região: Europa  
                🏛️ Capital: Valletta  
                <br><br>
                Um dos destinos turísticos mais bonitos do Mediterrâneo.
            </p>
        </div>

    </div>

</body>
</html>
