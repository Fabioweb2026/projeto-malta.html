<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FUNDO */
        body {
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("mata.png14.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            position: relative;
            padding: 20px;
        }

        /* OVERLAY ESCURO */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 0;
        }

        /* TÍTULO AJUSTADO */
        h1 {
            font-size: clamp(40px, 8vw, 80px);
            color: #ffffff;
            z-index: 1;
            position: relative;
            letter-spacing: 2px;
            max-width: 100%;
            word-wrap: break-word;
        }

    </style>
</head>

<body>

    <h1>Malta</h1>

</body>
</html>
