<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET E FUNDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fdfcf0 0%, #e6d5b8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CABEÇALHO */
        .hero {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 20px;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid #b39359;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #b39359;
            color: white;
        }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(60px, 12vw, 100px);
            color: #b39359;
            margin-top: 10px;
            letter-spacing: -2px;
        }

        /* GRID E CARDS */
        .container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 80px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(179, 147, 89, 0.15);
            transition: 0.4s;
            border: 1px solid rgba(179, 147, 89, 0.1);
            cursor: pointer;
        }

        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 45px rgba(179, 147, 89, 0.25);
        }

        /* EFEITO DE ZOOM NA IMAGEM */
        .card-img-wrapper {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-body {
            padding: 30px 20px;
            text-align: center;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            color: #b39359;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .card-body p {
            font-size: 11px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* BOTÃO DO CARD */
        .btn-card {
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid #b39359;
            color: #b39359;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-card:hover {
            background: #b39359;
            color: white;
        }
    </style>
</head>
<body>

    <header class="hero">
        <a href="index.html" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        <div class="glass-box">
            <h1>Malta</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Card 1 -->
            <div class="card">
                <div class="card-img-wrapper">
                    <img src="imagem10.jpg.png" alt="Malta Experience">
                </div>
                <div class="card-body">
                    <h3>Malta Experience</h3>
                    <p>Valletta, Malta</p>
                    <a href="#" class="btn-card">Explorar</a>
                </div>
            </div>

            <!-- Card 2: Nome Corrigido -->
            <div class="card">
                <div class="card-img-wrapper">
                    <img src="malta01.jpeg" alt="Giorgios Cafeteria">
                </div>
                <div class="card-body">
                    <h3>Giorgios Cafeteria</h3>
                    <p>Gastronomia e Café</p>
                    <a href="#" class="btn-card">Ver Menu</a>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card">
                <div class="card-img-wrapper">
                    <img src="malta8.jpg" alt="Turismo Lazer">
                </div>
                <div class="card-body">
                    <h3>Turismo Lazer</h3>
                    <p>Exploração e Aventura</p>
                    <a href="#" class="btn-card">Descobrir</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
