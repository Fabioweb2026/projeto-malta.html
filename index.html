<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malta</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background-image: url("malta10.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    /* TÍTULO FIXO NO TOPO */
    .header {
        width: 100%;
        text-align: center;
        padding-top: 25px;
    }

    .header h1 {
        font-size: 60px;
        color: #0b1f3a;
        background: rgba(255, 255, 255, 0.65);
        display: inline-block;
        padding: 10px 30px;
        border-radius: 10px;
        letter-spacing: 2px;
    }

    /* LAYOUT FORÇADO EM LINHA */
    .container {
        display: grid;
        grid-template-columns: 260px 1fr;
        align-items: center;
        gap: 30px;

        width: 80%;
        margin: 70px auto 0 auto;

        background: rgba(255, 255, 255, 0.55);
        padding: 20px;
        border-radius: 15px;
    }

    /* IMAGEM ESQUERDA FIXA */
    .container img {
        width: 240px;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    /* TEXTO DISCRETO */
    .info {
        color: #0b1f3a;
        font-size: 16px;
        line-height: 1.5;
    }

    .info h2 {
        font-size: 20px;
        margin-bottom: 8px;
        opacity: 0.85;
    }

    .info p {
        opacity: 0.9;
    }
</style>

</head>

<body>

    <!-- TÍTULO -->
    <div class="header">
        <h1>Malta</h1>
    </div>

    <!-- CONTEÚDO -->
    <div class="container">

        <!-- IMAGEM ESQUERDA -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- TEXTO DIREITA -->
        <div class="info">
            <h2>Localização</h2>
            <p>
                Malta é uma ilha no Mar Mediterrâneo, ao sul da Itália.<br><br>
                📍 Ilha de Malta – Mediterrâneo Central<br>
                🌍 Europa<br>
                🏛️ Capital: Valletta
            </p>
        </div>

    </div>

</body>
</html>
