<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Journey</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            padding: 20px;
        }

        /* CONTAINER PRINCIPAL */
        .container {
            display: flex;
            align-items: center;
            gap: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 1000px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* IMAGEM */
        .container img {
            width: 350px;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
        }

        /* TEXTO */
        .text {
            flex: 1;
        }

        .text h1 {
            margin-bottom: 10px;
            font-size: 28px;
            color: #333;
        }

        .text p {
            font-size: 16px;
            color: #555;
            line-height: 1.5;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            .container img {
                width: 100%;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- IMAGEM À ESQUERDA -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- TEXTO -->
        <div class="text">
            <h1>Malta Journey</h1>
            <p>
                Bem-vindo ao meu projeto sobre Malta.  
                Aqui compartilho experiências, imagens e histórias dessa viagem incrível.
                O layout foi feito para ficar moderno, simples e responsivo.
            </p>
        </div>

    </div>

</body>

</html>
