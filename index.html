<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FUNDO COM IMAGEM */
        body {
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("mata.png14.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            position: relative;
            min-height: 100vh;
        }

        /* CAMADA ESCURA SOBRE A IMAGEM */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        /* CONTEÚDO PRINCIPAL */
        .container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 40px;
        }

        /* IMAGEM ESQUERDA */
        .container img {
            width: 250px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* TEXTO */
        .text {
            max-width: 600px;
        }

        h1 {
            color: #1e3a8a; /* azul elegante */
            margin-bottom: 10px;
        }

        .location {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 8px;
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- IMAGEM -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- TEXTO -->
        <div class="text">
            <h1>Malta</h1>

            <p>
                Malta is a beautiful island country in the Mediterranean Sea,
                known for its crystal-clear waters, historic architecture,
                and rich cultural heritage.
            </p>

            <div class="location">
                Location: Mediterranean Sea, Southern Europe
            </div>
        </div>

    </div>

</body>
</html>
