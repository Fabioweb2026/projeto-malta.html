<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FUNDO */
        body {
            font-family: Arial, sans-serif;
            color: white;

            background-image: url("mata.png14.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            min-height: 100vh;

            position: relative;

            /* IMPORTANTE: remove flex que estava quebrando layout */
            display: block;

            padding: 60px 20px;

            text-align: center;
        }

        /* OVERLAY */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 0;
        }

        /* CONTEÚDO */
        .container {
            position: relative;
            z-index: 1;

            display: flex;
            align-items: center;
            justify-content: center;

            min-height: calc(100vh - 120px);
        }

        h1 {
            font-size: clamp(40px, 7vw, 70px);
            letter-spacing: 2px;
        }

    </style>
</head>

<body>

    <div class="container">
        <h1>Malta</h1>
    </div>

</body>
</html>
