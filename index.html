<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET E FUNDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
    background: linear-gradient(rgba(10, 25, 41, 0.8), rgba(10, 25, 41, 0.8)), url('imagem10.jpg.png') no-repeat center center fixed;
    background-size: cover;
    color: #ffffff; /* Texto branco para contrastar */
}

.card {
    background: rgba(255, 255, 255, 0.95); /* Card quase branco para saltar do fundo */
    border: none;
}

}

        }

        /* CABEÇALHO CENTRALIZADO */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            margin-bottom: 40px;
            border: 1px solid #b39359;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #b39359;
            color: white;
        }

        .side-frame img {
            width: 250px;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(179, 147, 89, 0.3);
            margin-bottom: 20px;
        }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 90px);
            color: #b39359;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            line-height: 1;
        }

        /* GRID DE CARDS */
        .container {
            max-width: 1200px;
            margin: 40px auto 100px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(179, 147, 89, 0.2);
            transition: 0.4s;
            border: 1px solid rgba(179, 147, 89, 0.1);
        }

        .card:hover { transform: translateY(-10px); }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #eee; /* Fundo cinza caso a imagem falhe */
        }

        .card-body {
            padding: 30px 20px;
            text-align: center;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            color: #b39359;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .card-body p {
            font-size: 13px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="hero">
        <a href="index.html" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        
        <div class="side-frame">
            <!-- Tente renomear malta1.jpeg para malta1.jpg no GitHub se não aparecer -->
            <img src="malta1.jpeg" alt="Malta Principal">
        </div>

        <div class="glass-box">
            <h1>Malta</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Card 1 -->
            <div class="card">
                <img src="malta10.jpg" alt="Malta Experience">
                <div class="card-body">
                    <h3>Malta Experience</h3>
                    <p>Valletta, Malta</p>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="card">
                <img src="cafe.jpg" alt="Gioges Cafeteria">
                <div class="card-body">
                    <h3>Gioges Cafeteria</h3>
                    <p>Gastronomia e Café</p>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card">
                <img src="turismo.jpg" alt="Turismo Lazer">
                <div class="card-body">
                    <h3>Turismo Lazer</h3>
                    <p>Exploração e Aventura</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
