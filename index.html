<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    color: white;

    background-image: url("mata.png14.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height: 100vh;

    /* IMPORTANTE: remove flex que causa o bug */
    display: block;

    position: relative;

    padding: 80px 20px;
    text-align: center;
}

/* camada escura correta */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 0;
}

/* garante que tudo fique acima do overlay */
h1 {
    position: relative;
    z-index: 1;

    font-size: clamp(40px, 6vw, 70px);
    letter-spacing: 2px;

    margin-top: 0;
}
</style>
