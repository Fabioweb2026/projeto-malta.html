<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malta</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        background: url("malta10.jpg") no-repeat center center/cover;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* TÍTULO FORTE E FIXO */
    .header {
        margin-top: 25px;
        text-align: center;
    }

    .header h1 {
        font-size: 62px;
        color: #0b1f3a;
        background: rgba(255,255,255,0.7);
        padding: 12px 35px;
        border-radius: 12px;
        display: inline-block;
        letter-spacing: 2px;
    }

    /* BLOCO CENTRAL LIMPO */
    .card {
        margin-top: 60px;
        width: 900px;
        max-width: 95%;
        display: flex;
        gap: 25px;
        align-items: center;

        background: rgba(255,255,255,0.65);
        padding: 20px;
        border-radius: 16px;
        backdrop-filter: blur(4px);
    }

    /* IMAGEM SEMPRE À ESQUERDA */
    .card img {
        width: 220px;
        height: 160px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    /* TEXTO DISCRETO E ELEGANTE */
    .text {
        color: #0b1f3a;
    }

    .text h2 {
        font-size: 20px;
        margin-bottom: 8px;
        opacity: 0.9;
    }

    .text p {
        font-size: 15px;
        line-height: 1.6;
        opacity: 0.85;
    }
</style>

</head>

<body>

    <div class="header">
        <h1>Malta</h1>
    </div>

    <div class="card">

        <!-- IMAGEM ESQUERDA -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- TEXTO DIREITA -->
        <div class="text">
            <h2>Localização</h2>
            <p>
                Malta é uma ilha localizada no Mar Mediterrâneo, ao sul da Itália.<br><br>
                📍 Ilha de Malta – Mediterrâneo Central<br>
                🌍 Europa<br>
                🏛️ Capital: Valletta
            </p>
        </div>

    </div>

</body>
</html>
