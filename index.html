<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Experiência Premium</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfaf8; 
            color: #1a1a1a; 
            overflow-x: hidden;
        }

        /* Banner Principal com Contraste Realçado */
        .hero-banner {
            height: 75vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), 
                        url('mata.png14.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 4px solid #d4af37; /* Dourado Ouro */
        }

        /* Moldura de Vidro para o Título */
        .glass-title {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .hero-banner h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(80px, 15vw, 140px); 
            color: #d4af37; /* Dourado Ouro */
            text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            font-weight: 900;
        }

        /* Botão Voltar Premium */
        .btn-back {
            position: absolute; top: 30px; left: 30px;
            text-decoration: none; color: #fff; font-weight: 800; font-size: 11px;
            text-transform: uppercase; border: 1px solid #d4af37; padding: 12px 25px;
            border-radius: 50px; background: rgba(0,0,0,0.5); transition: 0.3s;
        }
        .btn-back:hover { background: #d4af37; color: #000; }

        /* Container e Cards Postais */
        .container { max-width: 1200px; margin: -50px auto 80px; position: relative; z-index: 10; padding: 0 20px; }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
        }

        .guide-card {
            background: #fff; border-radius: 20px; overflow: hidden; 
            border: 1px solid #e5e1da; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .guide-card:hover { transform: translateY(-15px); border-color: #d4af37; }

        .guide-card img { width: 100%; height: 280px; object-fit: cover; }
        
        .card-body { padding: 30px; text-align: center; background: #fff; }
        .card-body h3 { 
            color: #1a1a1a; font-size: 22px; margin-bottom: 10px; 
            font-family: 'Playfair Display', serif; border-bottom: 2px solid #d4af37;
            display: inline-block; padding-bottom: 5px;
        }
        .card-body p { color: #666; font-size: 14px; margin-top: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

    <section class="hero-banner">
        <a href="index.html" class="btn-back">← Voltar ao Portfólio</a>
        <div class="glass-title">
            <h1>Malta</h1>
        </div>
    </section>

    <div class="container">
        <div class="guide-grid">
            <div class="guide-card">
             <div class="guide-grid">
    
    <!-- CARD 1: Gastronomia -->
    <div class="guide-card">
        <img src="giorgios3.png" alt="Gastronomia">
        <div class="card-body">
            <h3>Gastronomia</h3>
            <p>Sliema, Malta</p>
        </div>
    </div>

    <!-- CARD 2: História -->
    <div class="guide-card">
        <img src="malta1.jpeg" alt="História">
        <div class="card-body">
            <h3>Cidade Histórica</h3>
            <p>Valletta, Malta</p>
        </div>
    </div>

    <!-- CARD 3: Litoral -->
    <div class="guide-card">
        <img src="malta12.jpeg" alt="Litoral">
        <div class="card-body">
            <h3>Azure Horizons</h3>
            <p>Litoral Mediterrâneo</p>
        </div>
    </div>

</div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
