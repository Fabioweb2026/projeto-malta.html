<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Mediterranean</title>
    <style>
        /* Cores e Estilo do Fundo Creme/Bege */
        body {
            background-color: #F5F2EB; /* Bege predominante */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #3E3B35;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: #8C6D46; /* Tom bronze/mediterrâneo */
            font-size: 2.5rem;
        }

        /* Container dos 3 Cards */
        .card-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 100%;
        }

        /* Estilo dos Cards */
        .card {
            background-color: #FFFFFF;
            border: 1px solid #E6DFD3;
            border-radius: 12px;
            width: 300px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(140, 109, 70, 0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #EEE;
        }

        .card h3 {
            color: #8C6D46;
            margin: 15px 0 10px 0;
        }

        /* Estilo da Janela que Abre (Modal) */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #FDFBF7; /* Fundo creme claro interno */
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            position: relative;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #A0998E;
        }

        .close-btn:hover {
            color: #3E3B35;
        }

        .modal-body img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Malta Mediterranean</h1>
        <p>Explore as maravilhas do coração do Mediterrâneo</p>
    </header>

    <!-- CONTAINER DOS CARDS -->
    <div class="card-container">

        <!-- CARD 1: TURISMO -->
        <div class="card" onclick="openModal('Turismo em Malta', 'Descubra os melhores pontos turísticos, praias históricas e passeios guiados pelas ilhas maltesas.', 'imagem10.png')">
            <img src="imagem10.png" alt="Turismo em Malta">
            <h3>Turismo</h3>
            <p>Clique para explorar os principais pontos e rotas.</p>
        </div>

        <!-- CARD 2: GASTRONOMIA E ARQUITETURA -->
        <div class="card" onclick="openModal('Gastronomia e Arquitetura', 'Experimente o tradicional Pastizzi e encante-se com as construções barrocas e templos milenares de Valletta.', 'malta01.png')">
            <img src="malta01.png" alt="Gastronomia e Arquitetura">
            <h3>Gastronomia & Arquitetura</h3>
            <p>Clique para ver a culinária e as construções históricas.</p>
        </div>

        <!-- CARD 3: BLUE LAGOON -->
        <div class="card" onclick="openModal('Blue Lagoon', 'A lagoa de águas mais cristalinas e azuis de toda a Europa, localizada na icônica ilha de Comino.', 'bluelagoon.png')">
            <img src="bluelagoon.png" alt="Blue Lagoon">
            <h3>Blue Lagoon</h3>
            <p>Clique para ver fotos e detalhes sobre a lagoa azul.</p>
        </div>

    </div>

    <!-- JANELA FLUTUANTE (MODAL) -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modal-img" src="" alt="Imagem do Card">
                <h2 id="modal-title" style="color: #8C6D46; margin-top:0;"></h2>
                <p id="modal-text"></p>
            </div>
        </div>
    </div>

    <!-- SCRIPT PARA ABRIR E FECHAR -->
    <script>
        function openModal(title, text, imgSrc) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-text").innerText = text;
            document.getElementById("modal-img").src = imgSrc;
            document.getElementById("myModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }

        // Fecha se clicar fora da janelinha branca
        window.onclick = function(event) {
            let modal = document.getElementById("myModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
