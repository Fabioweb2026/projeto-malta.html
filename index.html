<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1a1a1a;
        }

        /* CONTAINER */
        .container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            padding: 50px;
        }

        /* IMAGEM */
        .container img {
            width: 280px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* TEXTO */
        h1 {
            color: #1e3a8a;
            font-size: 36px;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .container img {
                width: 90%;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- IMAGEM -->
        <img src="malta01.jpeg" alt="Malta">

        <!-- APENAS TÍTULO -->
        <h1>Malta</h1>

    </div>

</body>
</html>
