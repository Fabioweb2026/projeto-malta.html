<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Heritage</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfaf6; /* FUNDO CREME SUAVE */
            color: #1a1a1a; 
            overflow-x: hidden;
        }

        /* Banner com a imagem malta10.jpeg de fundo */
        .hero-banner {
            height: 70vh;
            width: 100%;
            /* Ajustado para malta10.jpeg com sobreposição para o texto aparecer bem */
            background: linear-gradient(rgba(253, 250, 246, 0.2), rgba(253, 250, 246, 1)), 
                        url('malta10.jpeg') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #e5e1da;
        }

        .hero-banner h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(80px, 15vw, 160px); 
            color: #b39359; /* DOURADO */
            letter-spacing: -2px;
            text-shadow: 2px 2px 0px #fff;
        }

        /* Botão Voltar */
        .btn-back {
            position: absolute; top: 30px; left: 30px;
            text-decoration: none; color: #b39359; font-weight: 800; font-size: 11px;
            text-transform: uppercase; border: 1px solid #b39359; padding: 10px 20px;
            border-radius: 50px; background: rgba(255,255,255,0.8); transition: 0.3s;
        }
        .btn-back:hover { background: #b39359; color: #fff; }

        /* Grade de Cards */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 20px 80px; }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .guide-card {
            background: #fff; border-radius: 28px; overflow: hidden; 
            border: 1px solid #eee; transition: 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .guide-card img { width: 100%; height: 260px; object-fit: cover; }
        .card-body { padding: 35px; text-align: center; }
        .card-body h3 { color: #b39359; font-size: 24px; margin-bottom: 15px; font-family: 'Playfair Display', serif; }
        .card-body p { color: #666; font-size: 15px; }

    </style>
</head>
<body>

    <section class="hero-banner">
        <a href="index.html" class="btn-back">← Voltar</a>
        <h1>Malta</h1>
    </section>

    <div class="container">
        <div class="guide-grid">
            <div class="guide-card">
                <img src="giorgios3.png" alt="Gastronomia">
                <div class="card-body">
                    <h3>Giorgios Cafeteria</h3>
                    <p>Sliema, Malta</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta1.jpeg" alt="História">
                <div class="card-body">
                    <h3>Cidade Histórica</h3>
                    <p>Valletta, Malta</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta12.jpeg" alt="Litoral">
                <div class="card-body">
                    <h3>Azure Horizons</h3>
                    <p>Litoral Mediterrâneo</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
