<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Experiência Premium</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfaf6; 
            color: #1a1a1a; 
            overflow-x: hidden;
        }

        /* Banner Principal - Fiel ao seu Print */
        .hero-banner {
            height: 70vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('mata.png14.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 2px solid #b39359;
            padding: 0 5%;
        }

        /* Moldura lateral esquerda */
        .hero-side-img {
            width: 350px;
            height: 250px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.5);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-right: 40px;
        }
        .hero-side-img img { width: 100%; height: 100%; object-fit: cover; }

        /* Título Central com Efeito Vidro */
        .glass-title {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 50px 100px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .hero-banner h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(60px, 12vw, 120px); 
            color: #b39359; /* DOURADO DO PRINT */
            letter-spacing: -2px;
            margin: 0;
        }

        /* Botão Voltar do Print */
        .btn-back {
            position: absolute; top: 30px; left: 30px;
            text-decoration: none; color: #fff; font-weight: 800; font-size: 11px;
            text-transform: uppercase; border: 1px solid #b39359; padding: 10px 22px;
            border-radius: 50px; background: rgba(0,0,0,0.5); transition: 0.3s;
        }
        .btn-back:hover { background: #b39359; color: #000; }

        /* Container dos Cards */
        .container { max-width: 1200px; margin: -50px auto 80px; padding: 0 20px; position: relative; z-index: 10; }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .guide-card {
            background: #fff; border-radius: 24px; overflow: hidden; 
            border: 1px solid #e5e1da; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* AJUSTE DAS IMAGENS: Agora elas vão preencher o espaço */
        .guide-card img { width: 100%; height: 220px; object-fit: cover; display: block; }

        .card-body { padding: 30px; }
        .card-body h3 { color: #b39359; font-size: 24px; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .card-body p { color: #888; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <section class="hero-banner">
        <a href="https://github.io" class="btn-back">← VOLTAR AO PORTFÓLIO</a>
        
        <div class="hero-side-img">
            <img src="malta1.jpeg" alt="Malta Side">
        </div>

        <div class="glass-title">
            <h1>Malta</h1>
        </div>
    </section>

    <div class="container">
        <div class="guide-grid">
            
            <div class="guide-card">
                <img src="giorgios3.png" alt="Gastronomia">
                <div class="card-body">
                    <h3>Gastronomia</h3>
                    <p>SLIEMA, MALTA</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta10.jpeg" alt="História">
                <div class="card-body">
                    <h3>Cidade Histórica</h3>
                    <p>VALLETTA, MALTA</p>
                </div>
            </div>

            <div class="guide-card">
                <img src="malta12.jpeg" alt="Litoral">
                <div class="card-body">
                    <h3>Azure Horizons</h3>
                    <p>LITORAL MEDITERRÂNEO</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
